{% extends "base.html" %}

{% block content %}
  <h1>Edit Contact</h1>
  <form method="POST">
    <label>Name:</label><br>
    <input type="text" name="name" value="{{ contact['name'] }}"><br><br>

    <label>Organization:</label><br>
    <input type="text" name="organization" value="{{ contact['organization'] }}"><br><br>

    <label>Role:</label><br>
    <input type="text" name="role" value="{{ contact['role'] }}"><br><br>

    <label>Email:</label><br>
    <input type="email" name="email" value="{{ contact['email'] }}"><br><br>

    <label>How you are connected:</label><br>
    <textarea name="connection" rows="4" cols="40">{{ contact['connection'] }}</textarea><br><br>

    <button type="submit">Update Contact</button>
  </form>
{% endblock %}
